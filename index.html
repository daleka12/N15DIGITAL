        ]
      },
      {

        sections: [

    // Usuarios del sistema
    const MOCK_USERS = [

    // Estudiantes adaptados a la nueva estructura
    const MOCK_STUDENTS = [
      // 4to Año - Sec 1 Naturales
      { id: 101, name: 'Alvarez, Mateo', year: '4to Año', sectionId: 'Sección 1 - Cs. Naturales' },
      { id: 102, name: 'Benitez, Sofia', year: '4to Año', sectionId: 'Sección 1 - Cs. Naturales' },
      { id: 103, name: 'Carrizo, Lucas', year: '4to Año', sectionId: 'Sección 1 - Cs. Naturales' },
      // 4to Año - Sec 1 Sociales
      { id: 104, name: 'Diaz, Valentina', year: '4to Año', sectionId: 'Sección 1 - Cs. Sociales y Humanidades' },
      // 1er Año - Sec 1 Tarde
      { id: 105, name: 'Fernandez, Juan', year: '1er Año', sectionId: 'Sección 1 - Ciclo Básico' },
    ];

    // Asistencias iniciales (simuladas)
    const MOCK_ATTENDANCE = [
      { studentId: 101, date: '2023-10-01', status: 'P' },
      { studentId: 101, date: '2023-10-02', status: 'P' },
      { studentId: 103, date: '2023-10-01', status: 'A' },
      { studentId: 103, date: '2023-10-02', status: 'A' },

    // Calificaciones iniciales
    const MOCK_GRADES = [
      { studentId: 101, subject: 'Matemática', t1: 8, t2: 9, t3: 8 },

    const MOCK_TOPICS = [
      { id: 1, date: '2023-10-01', subject: 'Matemática', year: '4to Año', sectionId: 'Sección 1 - Cs. Naturales', topic: 'Funciones Cuadráticas', observations: 'Se entregó TP N°4' },

    /**
     * ==========================================
     * UTILIDADES COMPARTIDAS
     * ==========================================
     */

    const exportToCSV = (data, filename) => {
      const csvContent = "data:text/csv;charset=utf-8,"
        + data.map(e => Object.values(e).join(",")).join("\n");
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    const shareOnWhatsApp = (text) => {
      const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
    };

    const calculateAverage = (g1, g2, g3) => {
      const nums = [g1, g2, g3].map(n => parseFloat(n)).filter(n => !isNaN(n));
      if (nums.length === 0) return '-';
      const sum = nums.reduce((a, b) => a + b, 0);
      return (sum / nums.length).toFixed(1);
    };

    // Componente Compartido: Selector de Curso y Sección
    const CourseSelector = ({ selectedYear, setSelectedYear, selectedSection, setSelectedSection }) => {
      const yearData = SCHOOL_STRUCTURE.find(y => y.year === selectedYear);

      return (
        <div className="flex flex-col sm:flex-row gap-3 bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
          <div className="flex-1">
            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Año</label>
            <select
              value={selectedYear}
              onChange={e => {
                setSelectedYear(e.target.value);
                const firstSection = SCHOOL_STRUCTURE.find(y => y.year === e.target.value).sections[0];
                setSelectedSection(`${firstSection.name} - ${firstSection.orientation}`);
              }}
              className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-slate-50 text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"
            >
              {SCHOOL_STRUCTURE.map(y => (
                <option key={y.year} value={y.year}>{y.year}</option>
              ))}
            </select>
          </div>

          <div className="flex-[2]">
            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Sección, Turno y Orientación</label>
            <select
              value={selectedSection}
              onChange={e => setSelectedSection(e.target.value)}
              className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-slate-50 text-sm focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500"
            >
              {yearData?.sections.map((s, idx) => (
                <option key={idx} value={`${s.name} - ${s.orientation}`}>
                  {s.name} | Turno {s.shift} | {s.orientation}
                </option>
              ))}
            </select>
          </div>

      );
    };

    /**
     * ==========================================

     * ==========================================
     */

    const LoginScreen = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);

        fetch("/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams(formData).toString()
        })
          .then(() => {
            console.log("Datos enviados a Netlify Forms");
            const user = MOCK_USERS.find(u => u.username === username && u.password === password);
            if (user) onLogin(user);
            else alert('Formulario enviado correctamente, pero el usuario o contraseña son incorrectos.');
          })
          .catch((error) => console.error("Error al enviar a Netlify:", error));
      };

      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-4 border-amber-500">
            <div className="text-center mb-8">
              <div className="w-20 h-20 bg-slate-900 rounded-full mx-auto flex items-center justify-center mb-4 shadow-lg">

              </div>
              <h1 className="text-2xl font-bold text-slate-800">N15 DIGITAL</h1>

    /**
     * ==========================================
     * MÓDULO: CALIFICACIONES
     * ==========================================
     */
    const GradesModule = ({ students }) => {
      const [selectedYear, setSelectedYear] = useState('4to Año');
      const [selectedSection, setSelectedSection] = useState('Sección 1 - Cs. Naturales');
      const [grades, setGrades] = useState(MOCK_GRADES);
      const [filter, setFilter] = useState('');

      // Filtrar alumnos por el curso y sección seleccionados
      const studentsInCourse = students.filter(s =>
        s.year === selectedYear && s.sectionId === selectedSection
      );
      const filteredStudents = studentsInCourse.filter(s => s.name.toLowerCase().includes(filter));

      const handleGradeChange = (studentId, term, value) => {
        const newGrades = [...grades];
        const index = newGrades.findIndex(g => g.studentId === studentId && g.subject === 'Matemática');

        if (index >= 0) newGrades[index][term] = value;
        else newGrades.push({ studentId, subject: 'Matemática', [term]: value });

        setGrades(newGrades);
      };

      const getGrade = (studentId, term) => {
        const g = grades.find(x => x.studentId === studentId && x.subject === 'Matemática');
        return g ? g[term] || '' : '';
      };

      const exportPDF = () => window.print();
      const exportExcel = () => exportToCSV(grades, `notas_${selectedYear}_${selectedSection}.csv`);
      const shareWA = () => {
        let text = `*Reporte de Calificaciones* 📚\n*Curso:* ${selectedYear} - ${selectedSection}\n\n`;
        filteredStudents.forEach(s => {
          const g1 = getGrade(s.id, 't1');
          const g2 = getGrade(s.id, 't2');
          const g3 = getGrade(s.id, 't3');
          const rd = getGrade(s.id, 'recDic');
          const rf = getGrade(s.id, 'recFeb');
          const avg = calculateAverage(g1, g2, g3);
          text += `👤 *${s.name}*\n`;
          text += `1°T: ${g1 || '-'} | 2°T: ${g2 || '-'} | 3°T: ${g3 || '-'}\n`;
          if (rd || rf) text += `Rec Dic: ${rd || '-'} | Rec Feb: ${rf || '-'}\n`;
          text += `*Promedio: ${avg}*\n\n`;
        });
        shareOnWhatsApp(text);
      };

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Gestión de Calificaciones</h2>
              <CourseSelector
                selectedYear={selectedYear} setSelectedYear={setSelectedYear}
                selectedSection={selectedSection} setSelectedSection={setSelectedSection}
              />

            <div className="flex space-x-2 print:hidden">
              <button onClick={exportPDF} className="p-2 text-slate-600 hover:bg-slate-200 rounded-lg bg-white border border-slate-200 shadow-sm" title="Imprimir/PDF"><Printer size={20} /></button>
              <button onClick={exportExcel} className="p-2 text-green-600 hover:bg-green-100 rounded-lg bg-white border border-slate-200 shadow-sm" title="Excel"><FileText size={20} /></button>
              <button onClick={shareWA} className="p-2 text-green-500 hover:bg-green-100 rounded-lg bg-white border border-slate-200 shadow-sm" title="WhatsApp"><Share2 size={20} /></button>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-4 border-b border-slate-100 flex gap-4 bg-slate-50 items-center">
              <div className="relative flex-1 max-w-md">
                <Search className="absolute left-3 top-2.5 text-slate-400" size={18} />
                <input
                  type="text"
                  placeholder="Buscar alumno en este curso..."
                  className="pl-10 w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:border-amber-500 text-sm"
                  onChange={(e) => setFilter(e.target.value.toLowerCase())}
                />
              </div>
              <div className="text-sm text-slate-500">
                <span className="font-bold text-amber-600">{studentsInCourse.length}</span> alumnos en nómina
              </div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left text-sm">
                <thead className="bg-slate-100 text-slate-600 font-medium">
                  <tr>
                    <th className="px-4 py-3 w-10">#</th>
                    <th className="px-4 py-3">Alumno</th>
                    <th className="px-4 py-3 text-center w-24">1° Tri</th>
                    <th className="px-4 py-3 text-center w-24">2° Tri</th>
                    <th className="px-4 py-3 text-center w-24">3° Tri</th>
                    <th className="px-4 py-3 text-center w-24 text-amber-600">Rec Dic</th>
                    <th className="px-4 py-3 text-center w-24 text-red-600">Rec Feb</th>
                    <th className="px-4 py-3 text-center w-24 font-bold">Prom</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {filteredStudents.length === 0 ? (
                    <tr><td colSpan="8" className="text-center py-8 text-slate-500">No hay alumnos registrados en esta sección.</td></tr>
                  ) : filteredStudents.map((student, idx) => {
                    const g1 = getGrade(student.id, 't1');
                    const g2 = getGrade(student.id, 't2');
                    const g3 = getGrade(student.id, 't3');
                    const avg = calculateAverage(g1, g2, g3);

                    return (
                      <tr key={student.id} className="hover:bg-slate-50 transition-colors">
                        <td className="px-4 py-3 text-slate-400">{idx + 1}</td>
                        <td className="px-4 py-3 font-medium text-slate-800">{student.name}</td>
                        {['t1', 't2', 't3', 'recDic', 'recFeb'].map(term => (
                          <td key={term} className="px-4 py-3 text-center">
                            <input
                              type="number"
                              className="w-16 p-1 text-center border border-slate-200 rounded focus:ring-2 focus:ring-amber-500 outline-none"
                              value={getGrade(student.id, term)}
                              onChange={(e) => handleGradeChange(student.id, term, e.target.value)}
                            />
                          </td>
                        ))}
                        <td className="px-4 py-3 text-center font-bold text-slate-900 bg-slate-50">
                          {avg}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    /**
     * ==========================================
     * MÓDULO: ASISTENCIA
     * ==========================================
     */
    const AttendanceModule = ({ students }) => {
      const [selectedYear, setSelectedYear] = useState('4to Año');
      const [selectedSection, setSelectedSection] = useState('Sección 1 - Cs. Naturales');
      const [attendanceData, setAttendanceData] = useState(MOCK_ATTENDANCE);
      const today = new Date().toISOString().split('T')[0];

      const studentsInCourse = students.filter(s => s.year === selectedYear && s.sectionId === selectedSection);

      const toggleAttendance = (studentId) => {
        const existingIdx = attendanceData.findIndex(a => a.studentId === studentId && a.date === today);
        let newStatus = 'P';

        const newData = [...attendanceData];
        if (existingIdx >= 0) {
          const current = newData[existingIdx].status;
          newStatus = current === 'P' ? 'A' : (current === 'A' ? 'J' : 'P');
          newData[existingIdx].status = newStatus;
        } else {
          newData.push({ studentId, date: today, status: 'P' });
        }
        setAttendanceData(newData);
      };

      const getStatus = (studentId) => {
        const entry = attendanceData.find(a => a.studentId === studentId && a.date === today);
        return entry ? entry.status : '-';
      };

      const calculatePercentage = (studentId) => {
        const records = attendanceData.filter(a => a.studentId === studentId);
        if (records.length === 0) return 100;
        const presents = records.filter(a => a.status === 'P' || a.status === 'J').length;
        return Math.round((presents / records.length) * 100);
      };

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
              <div className="flex justify-between items-center mb-2">
                <h2 className="text-2xl font-bold text-slate-800">Control de Asistencia</h2>
                <span className="text-slate-500 font-medium text-sm border px-3 py-1 rounded-full bg-white">{today}</span>
              </div>
              <CourseSelector
                selectedYear={selectedYear} setSelectedYear={setSelectedYear}
                selectedSection={selectedSection} setSelectedSection={setSelectedSection}
              />
            </div>
            <button className="bg-amber-500 hover:bg-amber-600 text-slate-900 shadow-md px-6 py-3 rounded-lg flex items-center gap-2 text-sm font-bold">
              <Save size={18} /> Guardar Planilla
            </button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {studentsInCourse.length === 0 ? (
              <div className="col-span-full text-center py-10 bg-white rounded-xl border border-slate-200 text-slate-500">
                Seleccione una sección con alumnos para registrar asistencia.
              </div>
            ) : studentsInCourse.map(student => {
              const status = getStatus(student.id);
              const percent = calculatePercentage(student.id);
              const isRisk = percent < 80;

              return (
                <div key={student.id} className={`bg-white p-4 rounded-xl border-l-4 shadow-sm flex items-center justify-between ${status === 'P' ? 'border-green-500' : (status === 'A' ? 'border-red-500' : (status === 'J' ? 'border-yellow-500' : 'border-slate-300'))
                  }`}>
                  <div>
                    <h3 className="font-bold text-slate-800">{student.name}</h3>
                    <div className="flex items-center gap-2 mt-1">

          case 'attendance': return <AttendanceModule students={students} />;
          case 'student_list': return <StudentListModule students={students} setStudents={setStudents} />;
          case 'topics': return <TopicsBookModule />;
          case 'calendar': return <CalendarModule />;
          case 'courses': return <CoursesModule />;
          case 'teacher_attendance': return <TeacherAttendanceModule />;
          // Vistas del Director (Admin)
          case 'users': return <ModulePlaceholder title="Gestión de Usuarios y Docentes" icon={Users} description="Administrar personal, asignar roles y permisos." />;
          case 'official_docs': return <ModulePlaceholder title="Documentación Oficial" icon={FileSignature} description="Firmar y validar actas, certificados y otra documentación oficial." />;
          case 'enrollments': return <ModulePlaceholder title="Matrículas e Inscripciones" icon={UserPlus} description="Gestionar el proceso de inscripciones y matrículas de estudiantes." />;
          case 'licenses': return <ModulePlaceholder title="Licencias Docentes" icon={Briefcase} description="Revisar, autorizar o rechazar licencias del personal docente." />;
          // Vistas del Preceptor
          case 'daily_attendance': return <ModulePlaceholder title="Asistencia y Novedades" icon={ClipboardCheck} description="Registrar asistencia diaria, tardanzas, retiros anticipados y justificar inasistencias." />;
          case 'daily_report': return <ModulePlaceholder title="Parte Diario" icon={ClipboardList} description="Administrar el parte diario del curso y verificar la presencia del profesor en el aula." />;
          case 'discipline': return <ModulePlaceholder title="Sanciones y Disciplina" icon={ShieldAlert} description="Registrar sanciones, llamados de atención y reportes de conducta." />;
          case 'communications': return <ModulePlaceholder title="Comunicaciones" icon={MessageSquare} description="Comunicar novedades a las familias y coordinar con Docentes y Directivos." />;
          // Vistas del Docente (Añadidas a las académicas iniciales)
          case 'student_list': return <ModulePlaceholder title="Lista de Alumnos" icon={UserSquare2} description="Ver y exportar las listas de alumnos por materia y curso asignado." />;
          case 'assignments': return <ModulePlaceholder title="Trabajos Prácticos" icon={ListTodo} description="Registrar y realizar seguimiento de los trabajos prácticos asignados." />;
          case 'observations': return <ModulePlaceholder title="Observaciones Académicas" icon={Lightbulb} description="Agregar y consultar observaciones académicas y conductuales de los alumnos." />;
          default: return <DashboardHome user={user} />;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 flex font-sans text-slate-800">

          {/* Sidebar Mobile Overlay */}
          {isSidebarOpen && (
            <div
              className="fixed inset-0 bg-black/50 z-40 lg:hidden"
              onClick={() => setSidebarOpen(false)}
            />
          )}

          {/* Sidebar */}
          <aside className={`
        fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transform transition-transform duration-200 ease-in-out flex flex-col lg:static lg:translate-x-0 print:hidden
        ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}
      `}>
            <div className="p-6 border-b border-slate-800 flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-amber-400 to-amber-600 rounded-lg flex items-center justify-center shadow-lg">
                <span className="font-bold text-slate-900">N15</span>
              </div>
              <div>
                <h1 className="font-bold text-lg leading-tight">N15 Digital</h1>
                <p className="text-xs text-slate-400">Tinogasta</p>
              </div>
            </div>

            <nav className="p-4 space-y-2 mt-4 flex-1 overflow-y-auto mb-20 scrollbar-thin scrollbar-thumb-slate-700">
              <SidebarItem
                icon={LayoutDashboard}
                label="Inicio"
                active={currentView === 'dashboard'}
                onClick={() => { setCurrentView('dashboard'); setSidebarOpen(false); }}
              />
              <div className="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Académico</div>
              <SidebarItem
                icon={GraduationCap}
                label="Calificaciones"
                active={currentView === 'grades'}
                onClick={() => { setCurrentView('grades'); setSidebarOpen(false); }}
              />
              <SidebarItem
                icon={BookOpen}
                label="Libro de Temas"
                active={currentView === 'topics'}
                onClick={() => { setCurrentView('topics'); setSidebarOpen(false); }}
              />

              {(user.role === 'teacher' || user.role === 'admin') && (
                <>
                  <SidebarItem icon={UserSquare2} label="Lista de Alumnos" active={currentView === 'student_list'} onClick={() => { setCurrentView('student_list'); setSidebarOpen(false); }} />
                  <SidebarItem icon={ListTodo} label="Trabajos Prácticos" active={currentView === 'assignments'} onClick={() => { setCurrentView('assignments'); setSidebarOpen(false); }} />
                  <SidebarItem icon={Lightbulb} label="Observaciones" active={currentView === 'observations'} onClick={() => { setCurrentView('observations'); setSidebarOpen(false); }} />
                </>
              )}

              {(user.role === 'admin' || user.role === 'preceptor') && (
                <SidebarItem
                  icon={CheckCircle}
                  label="Asistencia General"
                  active={currentView === 'attendance'}
                  onClick={() => { setCurrentView('attendance'); setSidebarOpen(false); }}
                />
              )}

              {user.role === 'admin' && (
                <>
                  <div className="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Dirección</div>
                  <SidebarItem icon={Users} label="Usuarios y Roles" active={currentView === 'users'} onClick={() => { setCurrentView('users'); setSidebarOpen(false); }} />
                  <SidebarItem icon={UserCheck} label="Asistencia Docente" active={currentView === 'teacher_attendance'} onClick={() => { setCurrentView('teacher_attendance'); setSidebarOpen(false); }} />
                  <SidebarItem icon={LayoutDashboard} label="Cursos" active={currentView === 'courses'} onClick={() => { setCurrentView('courses'); setSidebarOpen(false); }} />
                  <SidebarItem icon={FileSignature} label="Documentación Oficial" active={currentView === 'official_docs'} onClick={() => { setCurrentView('official_docs'); setSidebarOpen(false); }} />
                  <SidebarItem icon={UserPlus} label="Matrículas e Insc." active={currentView === 'enrollments'} onClick={() => { setCurrentView('enrollments'); setSidebarOpen(false); }} />
                  <SidebarItem icon={Briefcase} label="Licencias Docentes" active={currentView === 'licenses'} onClick={() => { setCurrentView('licenses'); setSidebarOpen(false); }} />
                </>
              )}

              {user.role === 'preceptor' && (
                <>
                  <div className="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Gestión Diaria</div>
                  <SidebarItem icon={ClipboardCheck} label="Asist. y Novedades" active={currentView === 'daily_attendance'} onClick={() => { setCurrentView('daily_attendance'); setSidebarOpen(false); }} />
                  <SidebarItem icon={ClipboardList} label="Parte Diario" active={currentView === 'daily_report'} onClick={() => { setCurrentView('daily_report'); setSidebarOpen(false); }} />
                  <SidebarItem icon={ShieldAlert} label="Disciplina" active={currentView === 'discipline'} onClick={() => { setCurrentView('discipline'); setSidebarOpen(false); }} />
                  <SidebarItem icon={MessageSquare} label="Comunicaciones" active={currentView === 'communications'} onClick={() => { setCurrentView('communications'); setSidebarOpen(false); }} />
                </>
              )}
            </nav>

            <div className="absolute bottom-0 w-full p-4 border-t border-slate-800 bg-slate-900 z-10">
              <button
                onClick={() => setUser(null)}
                className="flex items-center space-x-3 text-slate-400 hover:text-white transition-colors w-full px-4 py-2"
              >
                <LogOut size={20} />
                <span>Cerrar Sesión</span>
              </button>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 flex flex-col min-h-screen">
            {/* Topbar */}
            <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 sticky top-0 z-30 print:hidden">
              <button
                className="lg:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg"
                onClick={() => setSidebarOpen(true)}
              >
                <Menu size={24} />
              </button>

              <div className="flex-1 lg:flex-none"></div> {/* Spacer */}

              <div className="flex items-center gap-4">
                <div className="text-right hidden sm:block">
                  <p className="text-sm font-bold text-slate-800">{user.name}</p>
                  <p className="text-xs text-slate-500">{user.role.toUpperCase()}</p>
                </div>
                <div className="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center font-bold">
                  {user.name.charAt(0)}
                </div>
              </div>
            </header>

            {/* Content Area */}
            <div className="p-6 lg:p-8 flex-1 overflow-y-auto">
              {renderView()}
            </div>
          </main>
        </div>
      );
    }


    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
