    const exportToCSV = (data, filename) => {
      const csvContent = "data:text/csv;charset=utf-8,"
        + data.map(e => Object.values(e).join(",")).join("\n");
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");

      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

    const calculateAverage = (g1, g2, g3, rDic, rFeb) => {
      const nums = [g1, g2, g3].map(n => parseFloat(n)).filter(n => !isNaN(n));
      const rd = parseFloat(rDic);
      const rf = parseFloat(rFeb);

      let finalAvg = '-';
      if (nums.length > 0) {
        const sum = nums.reduce((a, b) => a + b, 0);
        finalAvg = (sum / nums.length).toFixed(1);
      }

      if (!isNaN(rf)) return rf.toFixed(1);
      if (!isNaN(rd)) return rd.toFixed(1);
      return finalAvg;
    };

      const [selectedSection, setSelectedSection] = useState('Sección 1 - Cs. Naturales');
      const [grades, setGrades] = useState(MOCK_GRADES);

      useEffect(() => {
        if (!USE_SUPABASE) return;
        async function fetchGrades() {
          const { data } = await supabase.from('grades').select('*').eq('subject', subjectName);
          if (data) setGrades(data);
        }
        fetchGrades();
      }, [subjectName]);

      const handleSaveAllGrades = async () => {
        if (!USE_SUPABASE) {
          alert('Calificaciones guardadas localmente.');
          return;
        }
        // Save to Supabase (using upsert based on unique studentId + subject)
        const gradesToSave = grades.filter(g => g.subject === subjectName);
        for (const grade of gradesToSave) {
          const toSave = { "studentId": grade.studentId, subject: grade.subject, t1: grade.t1 || null, t2: grade.t2 || null, t3: grade.t3 || null, "recDic": grade.recDic || null, "recFeb": grade.recFeb || null };
          if (grade.id) toSave.id = grade.id;
          await supabase.from('grades').upsert(toSave, { onConflict: '"studentId", subject' });
        }
        alert('Calificaciones guardadas en la nube (Supabase).');
      };

      const handleSaveStudent = (e) => {
        e.preventDefault();
        if (editingStudent) {
          setStudents(students.map(s => s.id === editingStudent.id ? { ...s, name: studentForm.name } : s));
        } else {
          setStudents([...students, { id: Date.now(), name: studentForm.name, year: selectedYear, sectionId: selectedSection }]);
        }
        setShowStudentForm(false);
      };

      // Filtrar alumnos por el curso y sección seleccionados
      const studentsInCourse = students.filter(s =>
        s.year === selectedYear && s.sectionId === selectedSection
      );
      const filteredStudents = studentsInCourse.filter(s => s.name.toLowerCase().includes(filter));

      const handleGradeChange = (studentId, term, value) => {
        const newGrades = [...grades];
        const index = newGrades.findIndex(g => g.studentId === studentId && g.subject === subjectName);

        if (index >= 0) newGrades[index][term] = value;
        else newGrades.push({ studentId, subject: subjectName, [term]: value });

        setGrades(newGrades);
      };

      const getGrade = (studentId, term) => {
        const g = grades.find(x => x.studentId === studentId && x.subject === subjectName);
        return g ? g[term] || '' : '';
      };

      const exportPDF = () => window.print();
      const exportExcel = () => exportToCSV(grades, `notas_${selectedYear}_${selectedSection}.csv`);
      const shareWA = () => {
        let text = `*Reporte de Calificaciones* 📚\n*Curso:* ${selectedYear} - ${selectedSection}\n*Materia:* ${subjectName} | *Docente:* ${teacherName}\n\n`;
        filteredStudents.forEach(s => {
          const g1 = getGrade(s.id, 't1');
          const g2 = getGrade(s.id, 't2');
          const g3 = getGrade(s.id, 't3');
          const rd = getGrade(s.id, 'recDic');
          const rf = getGrade(s.id, 'recFeb');
          const avg = calculateAverage(g1, g2, g3);
          text += `👤 *${s.name}*\n`;
          text += `1°T: ${g1 || '-'} | 2°T: ${g2 || '-'} | 3°T: ${g3 || '-'}\n`;
          if (rd || rf) text += `Rec Dic: ${rd || '-'} | Rec Feb: ${rf || '-'}\n`;
          text += `*Promedio: ${avg}*\n\n`;
        });
        shareOnWhatsApp(text);

                <input type="text" value={teacherName} onChange={e => setTeacherName(e.target.value)} className="text-slate-600 bg-transparent border-b border-slate-300 focus:border-amber-500 outline-none w-full sm:w-auto px-1 py-1" placeholder="Nombre del Docente" />

              <button onClick={exportPDF} className="p-2 text-slate-600 hover:bg-slate-200 rounded-lg bg-white border border-slate-200 shadow-sm" title="Imprimir/PDF"><Printer size={20} /></button>
              <button onClick={exportExcel} className="p-2 text-green-600 hover:bg-green-100 rounded-lg bg-white border border-slate-200 shadow-sm" title="Excel"><FileText size={20} /></button>
              <button onClick={shareWA} className="p-2 text-green-500 hover:bg-green-100 rounded-lg bg-white border border-slate-200 shadow-sm" title="Compartir PDF por WhatsApp"><Share2 size={20} /></button>
            </div>
          </div>

          {showStudentForm && (
            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-4 animate-in fade-in slide-in-from-top-4 print:hidden">

                <input required placeholder="Apellido, Nombre" className="flex-1 p-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none" value={studentForm.name} onChange={e => setStudentForm({ ...studentForm, name: e.target.value })} />

                <button type="submit" className="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-bold">Guardar</button>
              </form>
            </div>
          )}

          <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-4 border-b border-slate-100 flex gap-4 bg-slate-50 items-center">
              <div className="relative flex-1 max-w-md">
                <Search className="absolute left-3 top-2.5 text-slate-400" size={18} />
                <input

                  placeholder="Buscar alumno en este curso..."
                  className="pl-10 w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:border-amber-500 text-sm"
                  onChange={(e) => setFilter(e.target.value.toLowerCase())}
                />

                  ) : filteredStudents.map((student, idx) => {
                    const g1 = getGrade(student.id, 't1');
                    const g2 = getGrade(student.id, 't2');
                    const g3 = getGrade(student.id, 't3');
                    const rd = getGrade(student.id, 'recDic');
                    const rf = getGrade(student.id, 'recFeb');
                    const avg = calculateAverage(g1, g2, g3, rd, rf);

                    return (
                      <tr key={student.id} className="hover:bg-slate-50 transition-colors">

    /**
     * ==========================================
     * MÓDULO: ASISTENCIA
     * ==========================================
     */
    const AttendanceModule = ({ students, usersData, setUsersData, initialRole = 'students' }) => {
      const [selectedRole, setSelectedRole] = useState(initialRole);
      const [selectedYear, setSelectedYear] = useState('4to Año');
      const [selectedSection, setSelectedSection] = useState('Sección 1 - Cs. Naturales');
      const [attendanceData, setAttendanceData] = useState(MOCK_ATTENDANCE);
      const [editingUser, setEditingUser] = useState(null);
      const [editName, setEditName] = useState('');
      const [showUserForm, setShowUserForm] = useState(false);
      const today = new Date().toISOString().split('T')[0];

      useEffect(() => {
        if (!USE_SUPABASE) return;
        async function fetchAttendance() {
          const { data } = await supabase.from('attendance').select('*').eq('date', today);
          if (data) setAttendanceData(data);
        }
        fetchAttendance();
      }, [today]);

      const handleSaveAttendance = async () => {
        if (!USE_SUPABASE) {
          alert('Asistencia guardada localmente.');
          return;
        }
        const todayData = attendanceData.filter(a => a.date === today);
        for (const record of todayData) {
          const toSave = { "studentId": record.studentId, date: record.date, status: record.status };
          if (record.id) toSave.id = record.id;
          await supabase.from('attendance').upsert(toSave, { onConflict: '"studentId", date' });
        }
        alert('Asistencia guardada en Supabase.');
      };

      const toggleAttendance = (itemId) => {
        const existingIdx = attendanceData.findIndex(a => a.studentId === itemId && a.date === today);
        let newStatus = 'P';

        const newData = [...attendanceData];
        if (existingIdx >= 0) {
          const current = newData[existingIdx].status;
          newStatus = current === 'P' ? 'A' : (current === 'A' ? 'J' : 'P');
          newData[existingIdx].status = newStatus;
        } else {
          newData.push({ studentId: itemId, date: today, status: 'P' });
        }
        setAttendanceData(newData);
      };

      const getStatus = (itemId) => {
        const entry = attendanceData.find(a => a.studentId === itemId && a.date === today);
        return entry ? entry.status : '-';
      };

      const calculatePercentage = (itemId) => {
        const records = attendanceData.filter(a => a.studentId === itemId);
        if (records.length === 0) return 100;
        const presents = records.filter(a => a.status === 'P' || a.status === 'J').length;
        return Math.round((presents / records.length) * 100);
      };

      const renderList = () => {
        let list = [];
        if (selectedRole === 'students') {
          list = students.filter(s => s.year === selectedYear && s.sectionId === selectedSection);
        } else {
          list = usersData.filter(u => u.role === selectedRole);
        }

        if (list.length === 0) return <div className="col-span-full text-center py-10 bg-white rounded-xl border border-slate-200 text-slate-500">No hay registros para este filtro.</div>;

        return list.map(item => {
          const status = getStatus(item.id);
          const percent = calculatePercentage(item.id);
          const isRisk = percent < 80;

          return (
            <div key={item.id} className={`bg-white p-4 rounded-xl border-l-4 shadow-sm flex items-center justify-between ${status === 'P' ? 'border-green-500' : (status === 'A' ? 'border-red-500' : (status === 'J' ? 'border-yellow-500' : 'border-slate-300'))}`}>
              <div>
                <div className="flex items-center gap-2">
                  <h3 className="font-bold text-slate-800">{item.name}</h3>
                  {selectedRole !== 'students' && selectedRole !== 'admin' && (
                    <button onClick={() => { setEditingUser(item); setEditName(item.name); setShowUserForm(true); }} className="text-slate-400 hover:text-amber-500"><Edit size={14} /></button>
                  )}
                  {selectedRole === 'teacher' && (
                    <button onClick={() => { if (confirm("¿Eliminar docente?")) setUsersData(usersData.filter(u => u.id !== item.id)); }} className="text-slate-400 hover:text-red-500"><Trash2 size={14} /></button>
                  )}
                </div>
                <div className="flex items-center gap-2 mt-1">
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${isRisk ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                    {percent}% Asist.
                  </span>
                  {selectedRole === 'students' && isRisk && <AlertTriangle size={14} className="text-red-500" title="Riesgo por inasistencias" />}
                </div>
              </div>

              <button
                onClick={() => toggleAttendance(item.id)}
                className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-white transition-all shadow-sm ${status === 'P' ? 'bg-green-500' : (status === 'A' ? 'bg-red-500' : (status === 'J' ? 'bg-yellow-500' : 'bg-slate-100 text-slate-400 border border-slate-200'))}`}
              >
                {status === '-' ? <CheckCircle size={24} /> : status}
              </button>
            </div>
          );
        });
      };

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
          <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
              <div className="flex justify-between items-center mb-2">
                <h2 className="text-2xl font-bold text-slate-800">Control de Asistencia General</h2>
                <span className="text-slate-500 font-medium text-sm border px-3 py-1 rounded-full bg-white hidden sm:block">{today}</span>
              </div>
              <div className="flex flex-wrap gap-2 mb-4 bg-slate-200 p-1 rounded-lg w-fit">
                <button onClick={() => setSelectedRole('students')} className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${selectedRole === 'students' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}>Alumnos</button>
                <button onClick={() => setSelectedRole('teacher')} className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${selectedRole === 'teacher' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}>Docentes</button>
                <button onClick={() => setSelectedRole('preceptor')} className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${selectedRole === 'preceptor' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}>Preceptores</button>
                <button onClick={() => setSelectedRole('secretario')} className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${selectedRole === 'secretario' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}>Secretarios</button>
                <button onClick={() => setSelectedRole('admin')} className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${selectedRole === 'admin' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}>Directivos</button>
              </div>
              {selectedRole === 'students' && (
                <CourseSelector selectedYear={selectedYear} setSelectedYear={setSelectedYear} selectedSection={selectedSection} setSelectedSection={setSelectedSection} />
              )}
            </div>
            <div className="flex items-center gap-4">
              {selectedRole === 'teacher' && (
                <button onClick={() => { setEditingUser(null); setEditName(''); setShowUserForm(true); }} className="bg-slate-900 border border-slate-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm">+ Docente</button>
              )}
              <button onClick={handleSaveAttendance} className="bg-amber-500 hover:bg-amber-600 text-slate-900 shadow-md px-6 py-3 rounded-lg flex items-center gap-2 text-sm font-bold">
                <Save size={18} /> Guardar
              </button>
            </div>
          </div>

          {showUserForm && (
            <form onSubmit={(e) => {
              e.preventDefault();
              if (editingUser) setUsersData(usersData.map(u => u.id === editingUser.id ? { ...u, name: editName } : u));
              else setUsersData([...usersData, { id: Date.now(), name: editName, role: selectedRole }]);
              setShowUserForm(false); setEditingUser(null);
            }} className="bg-slate-100 p-4 rounded-xl flex flex-col sm:flex-row items-center gap-4 mb-4 border border-slate-300 shadow-sm animate-in fade-in slide-in-from-top-4">
              <input required type="text" placeholder="Nombre completo" className="flex-1 w-full p-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-amber-500" value={editName} onChange={e => setEditName(e.target.value)} />
              <div className="flex gap-2 w-full sm:w-auto">
                <button type="submit" className="flex-1 sm:flex-none bg-amber-500 text-slate-900 font-bold px-4 py-2 rounded-lg">Guardar</button>
                <button type="button" onClick={() => setShowUserForm(false)} className="flex-1 sm:flex-none bg-slate-200 text-slate-700 font-bold px-4 py-2 rounded-lg hover:bg-slate-300">Cancelar</button>
              </div>
            </form>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {renderList()}
          </div>

          {/* Leyenda */}
          <div className="flex gap-6 text-sm text-slate-600 justify-center pt-4 bg-white p-4 rounded-xl border border-slate-200">
            <span className="flex items-center gap-2 font-medium"><div className="w-4 h-4 rounded-full bg-green-500"></div> Presente (P)</span>
            <span className="flex items-center gap-2 font-medium"><div className="w-4 h-4 rounded-full bg-red-500"></div> Ausente (A)</span>
            <span className="flex items-center gap-2 font-medium"><div className="w-4 h-4 rounded-full bg-yellow-500"></div> Justificado (J)</span>
          </div>
        </div>
      );
    };

    /**
     * ==========================================
     * MÓDULO: LIBRO DE TEMAS
     * ==========================================
     */
    const TopicsBookModule = () => {
      const [selectedYear, setSelectedYear] = useState('4to Año');
      const [selectedSection, setSelectedSection] = useState('Sección 1 - Cs. Naturales');
      const [topics, setTopics] = useState(MOCK_TOPICS);
      const [showForm, setShowForm] = useState(false);
      const [newTopic, setNewTopic] = useState({ date: new Date().toISOString().split('T')[0], teacher: '', subject: '', topic: '', observations: '' });

      useEffect(() => {
        if (!USE_SUPABASE) return;
        async function fetchTopics() {
          const { data } = await supabase.from('topics')
            .select('*')
            .eq('year', selectedYear)
            .eq('sectionId', selectedSection);
          if (data) setTopics(data);
        }
        fetchTopics();
      }, [selectedYear, selectedSection]);

      const filteredTopics = topics.filter(t => t.year === selectedYear && t.sectionId === selectedSection);

      const handleAdd = async (e) => {
        e.preventDefault();
        const payload = {
          year: selectedYear,
          sectionId: selectedSection,
          ...newTopic
        };

        if (USE_SUPABASE) {
          const { data, error } = await supabase.from('topics').insert([payload]);
          if (error) {
             console.error(error);
             alert('Error al guardar en Supabase');
             return;
          }
          const { data: newData } = await supabase.from('topics').select('*').eq('year', selectedYear).eq('sectionId', selectedSection);
          if (newData) setTopics(newData);
        } else {
          setTopics([{ id: Date.now(), ...payload }, ...topics]);
        }
        setShowForm(false);
        setNewTopic({ date: new Date().toISOString().split('T')[0], teacher: '', subject: '', topic: '', observations: '' });
      };

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Libro de Temas Digital</h2>
              <CourseSelector
                selectedYear={selectedYear} setSelectedYear={setSelectedYear}
                selectedSection={selectedSection} setSelectedSection={setSelectedSection}
              />
            </div>
            <button
              onClick={() => setShowForm(!showForm)}
              className="bg-slate-900 text-white px-6 py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-slate-800 font-medium shadow-md"
            >
              <Plus size={18} /> Nueva Entrada
            </button>
          </div>

          {showForm && (
            <div className="bg-amber-50 p-6 rounded-xl border border-amber-200 animate-in fade-in slide-in-from-top-4 shadow-sm">
              <h3 className="font-bold text-amber-800 mb-4 flex items-center gap-2">
                <BookOpen size={20} /> Registrar Tema del Día
              </h3>
              <p className="text-sm text-amber-700 mb-4">Firmando en: {selectedYear} - {selectedSection}</p>
              <form onSubmit={handleAdd} className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <input
                    type="date"
                    required
                    className="p-3 rounded-lg border border-amber-200 w-full focus:ring-2 focus:ring-amber-500 outline-none bg-white font-medium text-slate-700"
                    value={newTopic.date}
                    onChange={e => setNewTopic({ ...newTopic, date: e.target.value })}
                  />
                  <input
                    required
                    className="p-3 rounded-lg border border-amber-200 w-full focus:ring-2 focus:ring-amber-500 outline-none bg-white"
                    placeholder="Docente a cargo (Ej. Prof. García)"
                    value={newTopic.teacher}
                    onChange={e => setNewTopic({ ...newTopic, teacher: e.target.value })}
                  />
                  <input
                    required
                    placeholder="Materia dictada"
                    className="p-3 rounded-lg border border-amber-200 w-full focus:ring-2 focus:ring-amber-500 outline-none bg-white"
                    value={newTopic.subject}
                    onChange={e => setNewTopic({ ...newTopic, subject: e.target.value })}
                  />
                  <input
                    required
                    placeholder="Tema Desarrollado"
                    className="p-3 rounded-lg border border-amber-200 w-full focus:ring-2 focus:ring-amber-500 outline-none bg-white"
                    value={newTopic.topic}
                    onChange={e => setNewTopic({ ...newTopic, topic: e.target.value })}
                  />
                </div>
                <textarea
                  placeholder="Observaciones / Material Complementario / Enlaces"
                  className="p-3 rounded-lg border border-amber-200 w-full h-24 focus:ring-2 focus:ring-amber-500 outline-none bg-white"
                  value={newTopic.observations}
                  onChange={e => setNewTopic({ ...newTopic, observations: e.target.value })}
                />
                <div className="flex justify-end gap-2">
                  <button type="button" onClick={() => setShowForm(false)} className="px-4 py-2 text-slate-600 hover:text-slate-800">Cancelar</button>
                  <button type="submit" className="px-6 py-2 bg-amber-500 text-slate-900 rounded-lg hover:bg-amber-600 font-bold shadow-sm">Guardar Firma</button>
                </div>
              </form>
            </div>
          )}

          <div className="bg-white rounded-xl shadow-sm border border-slate-200">
            {filteredTopics.length === 0 ? (
              <div className="p-8 text-center text-slate-500">No hay temas registrados para este curso aún.</div>
            ) : filteredTopics.map((item, idx) => (
              <div key={item.id} className={`p-6 flex flex-col md:flex-row gap-4 ${idx !== filteredTopics.length - 1 ? 'border-b border-slate-100' : ''}`}>
                <div className="md:w-32 flex-shrink-0">
                  <div className="text-sm font-bold text-slate-400 uppercase tracking-wider">{item.date}</div>
                  <div className="text-amber-600 font-bold mt-1">{item.subject}</div>
                  <div className="text-xs text-slate-500 mt-1">{item.teacher}</div>
                </div>
                <div className="flex-1">
                  <h4 className="font-bold text-slate-800 text-lg">{item.topic}</h4>
                  <p className="text-slate-600 mt-2 text-sm leading-relaxed">{item.observations}</p>
                </div>
                <div className="flex items-start gap-2">
                  <button className="p-2 hover:bg-slate-100 rounded-full text-slate-400"><Edit size={16} /></button>
                  <button className="p-2 hover:bg-red-50 rounded-full text-slate-400 hover:text-red-500"><Trash2 size={16} /></button>
                </div>
              </div>
            ))}

        </div>

    };

                    enrollments.map(e => (
                      <tr key={e.id} className="hover:bg-slate-50">
                        <td className="px-4 py-3 font-medium text-slate-800">{e.name}</td>
                        <td className="px-4 py-3 text-slate-600">{e.document}</td>
                        <td className="px-4 py-3 text-slate-600">{e.phone} {e.email && `| ${e.email}`}</td>
                        <td className="px-4 py-3 text-center">
                          <span className={`text-xs font-bold px-3 py-1 rounded-full cursor-pointer select-none transition-colors ${e.status === 'Pendiente' ? 'bg-yellow-100 text-yellow-800 hover:bg-yellow-200' : 'bg-green-100 text-green-800 hover:bg-green-200'}`} onClick={() => {
                            setEnrollments(enrollments.map(en => en.id === e.id ? { ...en, status: en.status === 'Pendiente' ? 'Matriculado' : 'Pendiente' } : en));
                          }}>{e.status}</span>
                        </td>
                      </tr>
                    ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const LicensesModule = () => {
      const [licenses, setLicenses] = useState([]);
      const [formData, setFormData] = useState({ firstName: '', lastName: '', document: '', address: '', phone: '' });

      const handleSave = (e) => {
        e.preventDefault();
        setLicenses([{ id: Date.now(), ...formData, status: 'Pendiente' }, ...licenses]);
        setFormData({ firstName: '', lastName: '', document: '', address: '', phone: '' });
        alert('Simulación: El PDF se adjuntó correctamente a la solicitud.');
      };

      const updateStatus = (id, newStatus) => {
        setLicenses(licenses.map(lic => lic.id === id ? { ...lic, status: newStatus } : lic));
      };

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
          <h2 className="text-2xl font-bold text-slate-800">Licencias Docentes</h2>
          <form onSubmit={handleSave} className="bg-white p-6 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4 shadow-sm">
            <h3 className="col-span-full font-bold text-slate-800 mb-2">Cargar Nueva Solicitud de Licencia</h3>
            <input required type="text" placeholder="Nombre" className="p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none" value={formData.firstName} onChange={e => setFormData({ ...formData, firstName: e.target.value })} />
            <input required type="text" placeholder="Apellido" className="p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none" value={formData.lastName} onChange={e => setFormData({ ...formData, lastName: e.target.value })} />
            <input required type="text" placeholder="N° Documento" className="p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none" value={formData.document} onChange={e => setFormData({ ...formData, document: e.target.value })} />
            <input required type="text" placeholder="N° Celular" className="p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none" value={formData.phone} onChange={e => setFormData({ ...formData, phone: e.target.value })} />
            <input required type="text" placeholder="Dirección" className="col-span-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none" value={formData.address} onChange={e => setFormData({ ...formData, address: e.target.value })} />
            <div className="col-span-full flex flex-col sm:flex-row items-start sm:items-center justify-between mt-2 gap-4">
              <button type="button" className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-3 rounded-lg text-sm font-bold flex gap-2 w-fit border border-slate-200 shadow-sm" onClick={() => alert('Simulación: Diálogo de selección de archivo PDF para adjuntar certificado.')}>Adjuntar Certificado (PDF)</button>
              <button type="submit" className="bg-amber-500 text-slate-900 font-bold px-8 py-3 rounded-lg shadow-sm w-full sm:w-auto">Agregar Licencia</button>
            </div>
          </form>

          <div className="grid grid-cols-1 gap-4">
            {licenses.length === 0 ? <p className="text-center py-8 text-slate-500 bg-white rounded-xl border border-slate-200 shadow-sm">No hay licencias cargadas.</p> :
              licenses.map(lic => (
                <div key={lic.id} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                  <div className="flex-1">
                    <h3 className="font-bold text-slate-800 text-lg">{lic.lastName}, {lic.firstName}</h3>
                    <p className="text-sm text-slate-500 mt-1">DNI: <span className="font-semibold text-slate-700">{lic.document}</span> | Celular: {lic.phone}</p>
                    <p className="text-sm text-slate-500">Dirección: {lic.address}</p>
                    <div className="mt-2 text-sm text-amber-600 font-bold underline cursor-pointer hover:text-amber-700 w-fit" onClick={() => alert('Simulación: Abriendo PDF visualizador.')}>Ver PDF adjunto</div>
                  </div>
                  <div className="flex flex-col items-start md:items-center gap-2">
                    {lic.status === 'Pendiente' ? (
                      <>
                        <span className="text-slate-500 text-xs font-bold uppercase tracking-wider mb-1">Decisión</span>
                        <div className="flex gap-2">
                          <button onClick={() => updateStatus(lic.id, 'Autorizada')} className="bg-green-100 text-green-700 hover:bg-green-200 p-3 rounded-full shadow-sm transition-transform hover:scale-105" title="Autorizar"><CheckCircle size={24} /></button>
                          <button onClick={() => updateStatus(lic.id, 'Rechazada')} className="bg-red-100 text-red-700 hover:bg-red-200 p-3 rounded-full shadow-sm transition-transform hover:scale-105" title="Rechazar"><XCircle size={24} /></button>
                        </div>
                      </>
                    ) : (
                      <div className={`px-4 py-2 font-bold rounded-lg text-center shadow-sm border ${lic.status === 'Autorizada' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                        {lic.status}
                      </div>
                    )}
                  </div>
                </div>
              ))}
          </div>
        </div>
      );
    };

    const DailyReportModule = () => {
      const [selectedYear, setSelectedYear] = useState('4to Año');
      const [selectedSection, setSelectedSection] = useState('Sección 1 - Cs. Naturales');
      const [note, setNote] = useState('');

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
          <h2 className="text-2xl font-bold text-slate-800">Parte Diario</h2>
          <CourseSelector selectedYear={selectedYear} setSelectedYear={setSelectedYear} selectedSection={selectedSection} setSelectedSection={setSelectedSection} />
          <div className="bg-white p-6 rounded-xl border border-slate-200">
            <textarea
              placeholder="Escribir notas sobre el comportamiento del curso, novedades e inasistencias docentes..."
              className="w-full p-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none text-sm resize-y min-h-[150px] bg-slate-50"
              value={note}
              onChange={e => setNote(e.target.value)}
            ></textarea>
            <div className="mt-4 flex justify-end">
              <button className="bg-amber-500 hover:bg-amber-600 text-slate-900 shadow-sm px-6 py-2 rounded-lg text-sm font-bold flex items-center gap-2" onClick={() => { if (note) { alert('Parte Diario guardado correctamente.'); setNote(''); } }}>
                <Save size={18} /> Guardar Parte
              </button>
            </div>
          </div>
        </div>
      );
    };

    const DisciplineModule = ({ students }) => {
      const [selectedYear, setSelectedYear] = useState('4to Año');
      const [selectedSection, setSelectedSection] = useState('Sección 1 - Cs. Naturales');
      const [observations, setObservations] = useState({});
      const [filter, setFilter] = useState('');

      const studentsInCourse = students.filter(s => s.year === selectedYear && s.sectionId === selectedSection);
      const filteredStudents = studentsInCourse.filter(s => s.name.toLowerCase().includes(filter));

      const handleChangeText = (id, text) => {
        setObservations(prev => ({ ...prev, [id]: text }));
      };

      const shareWA = (student) => {
        const note = observations[student.id] || 'Sin actas de disciplina registradas.';
        const text = `*Reporte de Disciplina* 🛡️\n*Alumno:* ${student.name}\n*Curso:* ${student.year} - ${student.sectionId}\n\n*Nota Disciplinaria:*\n${note}`;
        shareOnWhatsApp(text);
      };

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
          <div className="flex flex-col md:flex-row justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Sanciones y Disciplina</h2>
              <CourseSelector selectedYear={selectedYear} setSelectedYear={setSelectedYear} selectedSection={selectedSection} setSelectedSection={setSelectedSection} />
            </div>
            <div className="flex gap-2 print:hidden items-end">
              <button onClick={() => window.print()} className="p-3 text-slate-600 hover:bg-slate-200 rounded-lg bg-white border border-slate-200 shadow-sm font-bold flex items-center gap-2" title="Guardar PDF"><Printer size={18} /> Guardar PDF</button>
            </div>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-4 border-b border-slate-100 flex gap-4 bg-slate-50 items-center">
              <div className="relative flex-1 max-w-md">
                <Search className="absolute left-3 top-2.5 text-slate-400" size={18} />
                <input type="text" placeholder="Buscar alumno..." className="pl-10 w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:border-amber-500 text-sm" onChange={(e) => setFilter(e.target.value.toLowerCase())} />
              </div>
            </div>
            <div className="p-4 space-y-4">
              {filteredStudents.length === 0 ? <p className="text-center py-8 text-slate-500">No hay alumnos registrados.</p> :
                filteredStudents.map((s, idx) => (
                  <div key={s.id} className="border border-slate-200 rounded-lg p-4 bg-slate-50 relative">
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="font-bold text-slate-800">{idx + 1}. {s.name}</h3>
                      <div className="flex gap-2">
                        <button onClick={() => shareWA(s)} className="text-green-500 hover:text-green-600 p-2 bg-green-50 hover:bg-green-100 rounded-lg print:hidden flex items-center gap-2 text-sm font-bold transition-colors" title="Compartir WhatsApp"><Share2 size={16} /> WhatsApp</button>
                        <button onClick={() => alert('Nota disciplinaria guardada para ' + s.name)} className="text-amber-500 hover:text-amber-600 p-2 bg-amber-50 hover:bg-amber-100 rounded-lg print:hidden transition-colors" title="Guardar"><Save size={16} /></button>
                      </div>
                    </div>
                    <textarea placeholder="Escribir reporte de disciplina, amonestaciones, llamados de atención..." className="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none text-sm resize-y min-h-[80px] bg-white" value={observations[s.id] || ''} onChange={e => handleChangeText(s.id, e.target.value)}></textarea>
                  </div>
                ))}
            </div>
          </div>
        </div>
      );
    };

    const CommunicationsModule = ({ setNotifications }) => {
      const [recipient, setRecipient] = useState('docentes');
      const [message, setMessage] = useState('');

      const sendComm = (e) => {
        e.preventDefault();
        setNotifications(prev => [{ id: Date.now(), to: recipient, message, date: new Date().toLocaleString() }, ...prev]);
        setMessage('');
        alert('Comunicado publicado exitosamente para: ' + recipient.toUpperCase());
      };

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
          <h2 className="text-2xl font-bold text-slate-800">Comunicaciones Institucionales</h2>
          <div className="bg-white p-6 rounded-xl border border-slate-200 max-w-2xl shadow-sm">
            <form onSubmit={sendComm} className="flex flex-col gap-4">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">Grupo Destinatario:</label>
                <select className="w-full p-3 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-amber-500 bg-slate-50 font-medium" value={recipient} onChange={e => setRecipient(e.target.value)}>
                  <option value="docentes">Docentes</option>
                  <option value="directivos">Directivos</option>
                  <option value="todos">Todos (Docentes y Directivos)</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">Aviso / Comunicado Oficial:</label>
                <textarea required placeholder="Ej: Los alumnos del 4to Año no tendrán clases en las horas de Matemática..." className="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-amber-500 outline-none text-sm min-h-[120px] bg-white" value={message} onChange={e => setMessage(e.target.value)}></textarea>
              </div>
              <button type="submit" className="bg-amber-500 text-slate-900 font-bold px-6 py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-amber-600 transition-colors shadow-sm w-full md:w-auto self-end mt-2">
                <Send size={18} /> Publicar Comunicado
              </button>
            </form>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [currentView, setCurrentView] = useState('dashboard');
      const [isSidebarOpen, setSidebarOpen] = useState(false);
      const [students, setStudents] = useState(MOCK_STUDENTS);
      const [usersData, setUsersData] = useState(MOCK_USERS);
      const [notifications, setNotifications] = useState([]);
      const [loading, setLoading] = useState(USE_SUPABASE);

      useEffect(() => {
        if (!USE_SUPABASE) return;
        async function loadData() {
          try {
            const { data: stData } = await supabase.from('students').select('*');
            if (stData && stData.length > 0) setStudents(stData);
            
            const { data: usData } = await supabase.from('users').select('*');
            if (usData && usData.length > 0) setUsersData(usData);
          } catch(e) {
            console.error("Error cargando Supabase: ", e);
          } finally {
            setLoading(false);
          }
        }
        loadData();
      }, []);

      if (loading) return <div className="flex bg-slate-900 justify-center items-center h-screen text-amber-500 font-bold text-xl">Conectando a Supabase...</div>;

      if (!user) {
        return <LoginScreen onLogin={setUser} />;
      }

      if (user.role === 'admin' && !user.subRoleSelected) {
        return <AdminRoleSelection user={user} onSelect={setUser} />;
      }

      const renderView = () => {
        switch (currentView) {
          case 'dashboard': return <DashboardHome user={user} setCurrentView={setCurrentView} notifications={notifications} />;
          case 'grades': return <GradesModule students={students} setStudents={setStudents} />;
          case 'attendance': return <AttendanceModule students={students} usersData={usersData} setUsersData={setUsersData} />;
          case 'student_list': return <StudentListModule students={students} setStudents={setStudents} />;
          case 'topics': return <TopicsBookModule />;
          case 'official_docs': return <OfficialDocsModule />;
          case 'enrollments': return <EnrollmentsModule />;
          case 'licenses': return <LicensesModule />;
          case 'calendar': return <CalendarModule />;
          // Vistas del Preceptor
          case 'daily_report': return <DailyReportModule />;
          case 'discipline': return <DisciplineModule students={students} />;
          case 'communications': return <CommunicationsModule setNotifications={setNotifications} />;
          // Vistas del Docente (Añadidas a las académicas iniciales)
          case 'assignments': return <AssignmentsModule students={students} />;
          case 'observations': return <ObservationsModule students={students} />;
          default: return <DashboardHome user={user} setCurrentView={setCurrentView} notifications={notifications} />;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 flex font-sans text-slate-800">

          {/* Sidebar Mobile Overlay */}
          {isSidebarOpen && (
            <div
              className="fixed inset-0 bg-black/50 z-40 lg:hidden"
              onClick={() => setSidebarOpen(false)}
            />
          )}

          {/* Sidebar */}
          <aside className={`
        fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transform transition-transform duration-200 ease-in-out flex flex-col lg:static lg:translate-x-0 print:hidden
        ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}
      `}>
            <div className="p-6 border-b border-slate-800 flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-amber-400 to-amber-600 rounded-lg flex items-center justify-center shadow-lg">
                <span className="font-bold text-slate-900">N15</span>
              </div>
              <div>
                <h1 className="font-bold text-lg leading-tight">N15 Digital</h1>
                <p className="text-xs text-slate-400">Tinogasta</p>
              </div>
            </div>

            <nav className="p-4 space-y-2 mt-4 flex-1 overflow-y-auto scrollbar-thin scrollbar-thumb-slate-700">
              <SidebarItem
                icon={LayoutDashboard}
                label="Inicio"
                active={currentView === 'dashboard'}
                onClick={() => { setCurrentView('dashboard'); setSidebarOpen(false); }}
              />
              <div className="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Académico</div>
              <SidebarItem
                icon={GraduationCap}
                label="Calificaciones"
                active={currentView === 'grades'}
                onClick={() => { setCurrentView('grades'); setSidebarOpen(false); }}
              />
              <SidebarItem
                icon={BookOpen}
                label="Libro de Temas"
                active={currentView === 'topics'}
                onClick={() => { setCurrentView('topics'); setSidebarOpen(false); }}
              />

              {(user.role === 'teacher' || user.role === 'admin') && (
                <>
                  <SidebarItem icon={UserSquare2} label="Lista de Alumnos" active={currentView === 'student_list'} onClick={() => { setCurrentView('student_list'); setSidebarOpen(false); }} />
                  <SidebarItem icon={ListTodo} label="Trabajos Prácticos" active={currentView === 'assignments'} onClick={() => { setCurrentView('assignments'); setSidebarOpen(false); }} />
                  <SidebarItem icon={Lightbulb} label="Observaciones" active={currentView === 'observations'} onClick={() => { setCurrentView('observations'); setSidebarOpen(false); }} />
                </>
              )}

              {(user.role === 'admin' || user.role === 'preceptor') && (
                <SidebarItem
                  icon={CheckCircle}
                  label="Asistencia General"
                  active={currentView === 'attendance'}
                  onClick={() => { setCurrentView('attendance'); setSidebarOpen(false); }}
                />
              )}

              {user.role === 'admin' && (
                <>
                  <div className="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Dirección</div>
                  <SidebarItem icon={Users} label="Usuarios y Roles" active={currentView === 'users'} onClick={() => { setCurrentView('users'); setSidebarOpen(false); }} />
                  <SidebarItem icon={FileSignature} label="Documentación Oficial" active={currentView === 'official_docs'} onClick={() => { setCurrentView('official_docs'); setSidebarOpen(false); }} />
                  <SidebarItem icon={UserPlus} label="Matrículas e Insc." active={currentView === 'enrollments'} onClick={() => { setCurrentView('enrollments'); setSidebarOpen(false); }} />
                  <SidebarItem icon={Briefcase} label="Licencias Docentes" active={currentView === 'licenses'} onClick={() => { setCurrentView('licenses'); setSidebarOpen(false); }} />
                </>
              )}

              {user.role === 'preceptor' && (
                <>
                  <div className="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Gestión Diaria</div>
                  <SidebarItem icon={ClipboardList} label="Parte Diario" active={currentView === 'daily_report'} onClick={() => { setCurrentView('daily_report'); setSidebarOpen(false); }} />
                  <SidebarItem icon={ShieldAlert} label="Disciplina" active={currentView === 'discipline'} onClick={() => { setCurrentView('discipline'); setSidebarOpen(false); }} />
                  <SidebarItem icon={MessageSquare} label="Comunicaciones" active={currentView === 'communications'} onClick={() => { setCurrentView('communications'); setSidebarOpen(false); }} />
                  <SidebarItem icon={Calendar} label="Calendario" active={currentView === 'calendar'} onClick={() => { setCurrentView('calendar'); setSidebarOpen(false); }} />
                </>
              )}
            </nav>

            <div className="w-full p-4 border-t border-slate-800 bg-slate-900">
              <button
                onClick={() => setUser(null)}
                className="flex items-center space-x-3 text-slate-400 hover:text-white transition-colors w-full px-4 py-2"
              >
                <LogOut size={20} />
                <span>Cerrar Sesión</span>
              </button>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 flex flex-col min-h-screen">
            {/* Topbar */}
            <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 sticky top-0 z-30 print:hidden">
              <button
                className="lg:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg"
                onClick={() => setSidebarOpen(true)}
              >
                <Menu size={24} />
              </button>

              <div className="flex-1 lg:flex-none"></div> {/* Spacer */}

              <div className="flex items-center gap-4">
                <div className="text-right hidden sm:block">
                  <p className="text-sm font-bold text-slate-800">{user.name}</p>
                  <p className="text-xs text-slate-500">{user.role.toUpperCase()}</p>
                </div>
                <div className="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center font-bold">
                  {user.name.charAt(0)}
                </div>
              </div>
            </header>

            {/* Content Area */}
            <div className="p-6 lg:p-8 flex-1 overflow-y-auto">
              {renderView()}
            </div>
          </main>
        </div>
      );
    }


    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
